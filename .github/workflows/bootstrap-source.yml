name: Bootstrap complete source tree

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/source-bootstrap.b64.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Assemble, verify and extract source package
        run: |
          cat .bootstrap/source-bootstrap.b64.* | base64 --decode > /tmp/source-bootstrap.tar.gz
          echo 'fe336267c7bfead6b6ca43bb66aa721e9ae9b6e9a27d6aa384041e2d2b274a20  /tmp/source-bootstrap.tar.gz' | sha256sum -c -
          mkdir -p /tmp/source-tree
          tar -xzf /tmp/source-bootstrap.tar.gz -C /tmp/source-tree
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.bootstrap/' \
            /tmp/source-tree/ ./
      - name: Commit complete source tree
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf .bootstrap .github/workflows/bootstrap-source.yml
          git add -A
          git commit -m 'feat: publish complete audited source tree'
          git push
