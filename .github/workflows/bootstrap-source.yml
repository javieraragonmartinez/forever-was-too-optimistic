name: Bootstrap complete source tree

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/READY'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Assemble and verify source package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.bootstrap/source-bootstrap.b64.*)
          echo "Payload files found: ${#parts[@]}"
          printf '  %s\n' "${parts[@]}"
          if (( ${#parts[@]} == 0 )); then
            echo 'No payload fragments were found.' >&2
            exit 1
          fi
          cat "${parts[@]}" | base64 --decode > /tmp/source-bootstrap.tar.gz
          actual_sha="$(sha256sum /tmp/source-bootstrap.tar.gz | awk '{print $1}')"
          expected_sha='fe336267c7bfead6b6ca43bb66aa721e9ae9b6e9a27d6aa384041e2d2b274a20'
          echo "Expected SHA-256: ${expected_sha}"
          echo "Actual SHA-256:   ${actual_sha}"
          test "${actual_sha}" = "${expected_sha}"
          tar -tzf /tmp/source-bootstrap.tar.gz | sed -n '1,80p'

      - name: Extract complete source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/source-tree
          mkdir -p /tmp/source-tree
          tar -xzf /tmp/source-bootstrap.tar.gz -C /tmp/source-tree
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.bootstrap/' \
            /tmp/source-tree/ ./
          rm -rf .bootstrap .github/workflows/bootstrap-source.yml
          echo 'Working tree after extraction:'
          git status --short

      - name: Commit complete source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes were produced by the bootstrap.' >&2
            exit 1
          fi
          git commit -m 'feat: publish complete audited source tree'
          git push origin HEAD:main
