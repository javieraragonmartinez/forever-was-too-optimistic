name: Bootstrap complete source tree

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/source-bootstrap.b64'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode and extract source package
        run: |
          base64 --decode .bootstrap/source-bootstrap.b64 > /tmp/source-bootstrap.tar.gz
          mkdir -p /tmp/source-tree
          tar -xzf /tmp/source-bootstrap.tar.gz -C /tmp/source-tree
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.bootstrap/' \
            /tmp/source-tree/ ./
      - name: Commit complete source tree
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf .bootstrap .github/workflows/bootstrap-source.yml
          git add -A
          git commit -m 'feat: publish complete audited source tree'
          git push
