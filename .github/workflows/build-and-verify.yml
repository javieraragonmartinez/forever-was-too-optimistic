name: Build and verify
run-name: Build and verify · ${{ github.ref_name }} · ${{ github.sha }}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-and-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify exact certificate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Generate canonical certificate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          if test -f artifacts/bcw-yagzhev-dim79.json; then
            cp artifacts/bcw-yagzhev-dim79.json /tmp/committed-bcw-yagzhev-dim79.json
          fi
          python scripts/bcw_yagzhev_certificate.py --write-artifact artifacts/bcw-yagzhev-dim79.json
          if test -f /tmp/committed-bcw-yagzhev-dim79.json; then
            cmp /tmp/committed-bcw-yagzhev-dim79.json artifacts/bcw-yagzhev-dim79.json
          fi

      - name: Run release test suite
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Regenerate certificate byte for byte
        run: |
          python scripts/bcw_yagzhev_certificate.py --write-artifact /tmp/bcw-yagzhev-dim79.json
          cmp /tmp/bcw-yagzhev-dim79.json artifacts/bcw-yagzhev-dim79.json

      - name: Run independent verifier
        run: python scripts/verify_bcw_yagzhev_artifact.py artifacts/bcw-yagzhev-dim79.json

      - name: Validate JSON Schema 2020-12
        run: python -m jsonschema -i artifacts/bcw-yagzhev-dim79.json artifacts/bcw-yagzhev-certificate.schema.json

      - name: Verify committed integrity manifest
        if: hashFiles('artifacts/SHA256SUMS') != ''
        run: sha256sum -c artifacts/SHA256SUMS

  paper:
    name: Compile preprint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compile LaTeX manuscript
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ahora-sabemos-v1.0.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error
