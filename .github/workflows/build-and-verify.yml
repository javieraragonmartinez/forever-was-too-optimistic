name: Build and verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install -r requirements.txt
      - name: Regenerate certificate byte for byte
        run: |
          python scripts/bcw_yagzhev_certificate.py --write-artifact /tmp/certificate.json
          if test -f artifacts/bcw-yagzhev-dim79.json; then
            cmp /tmp/certificate.json artifacts/bcw-yagzhev-dim79.json
          fi
      - name: Run independent verification and tests
        run: |
          python scripts/verify_bcw_yagzhev_artifact.py /tmp/certificate.json
          python -m jsonschema -i /tmp/certificate.json artifacts/bcw-yagzhev-certificate.schema.json
          python -m unittest discover -v
      - name: Verify committed integrity manifest
        if: hashFiles('artifacts/SHA256SUMS') != ''
        run: sha256sum -c artifacts/SHA256SUMS

  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xu-cheng/latex-action@v3
        with:
          root_file: ahora-sabemos-v1.0.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error
