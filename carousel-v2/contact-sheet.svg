<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1280" viewBox="0 0 1600 1280" role="img" aria-labelledby="t d"><title id="t">Ten-panel academic carousel overview</title><desc id="d">Contact sheet showing the revised ten-panel narrative of the preprint.</desc><rect width="1600" height="1280" fill="#f5f0e6"/><text x="70" y="78" fill="#08111f" font-family="Georgia,serif" font-size="42" font-weight="700">Carrusel académico revisado · 10 láminas</text><text x="70" y="116" fill="#506070" font-family="Arial" font-size="20">Preprint independiente · comunicación prudente · verificación abierta</text><g font-family="Arial"><g transform="translate(70 170)"><rect width="280" height="460" rx="16" fill="#08111f"/><text x="22" y="36" fill="#c9912b" font-size="14" font-weight="700">1/10 · PORTADA</text><text x="22" y="100" fill="#f5f0e6" font-family="Georgia" font-size="28" font-weight="700">“Siempre” era</text><text x="22" y="134" fill="#f5f0e6" font-family="Georgia" font-size="28" font-weight="700">demasiado optimista</text><path d="M50 235L140 315L230 235M140 215V315" fill="none" stroke="#c9912b" stroke-width="3"/><circle cx="140" cy="315" r="16" fill="#c9912b"/></g><g transform="translate(365 170)"><rect width="280" height="460" rx="16" fill="#08111f"/><text x="22" y="36" fill="#c9912b" font-size="14" font-weight="700">2/10 · COLISIÓN</text><text x="22" y="98" fill="#f5f0e6" font-family="Georgia" font-size="29" font-weight="700">Tres puntos.</text><text x="22" y="134" fill="#f5f0e6" font-family="Georgia" font-size="29" font-weight="700">Una imagen.</text><text x="22" y="220" fill="#d6dbe2" font-size="16">p₁ = (0,0,−1/4)</text><text x="22" y="252" fill="#d6dbe2" font-size="16">p₂ = (1,−3/2,13/2)</text><text x="22" y="284" fill="#d6dbe2" font-size="16">p₃ = (−1,3/2,13/2)</text></g><g transform="translate(660 170)"><rect width="280" height="460" rx="16" fill="#08111f"/><text x="22" y="36" fill="#c9912b" font-size="14" font-weight="700">3/10 · LOCAL / GLOBAL</text><text x="22" y="96" fill="#f5f0e6" font-family="Georgia" font-size="25" font-weight="700">Invertibilidad local</text><text x="22" y="128" fill="#f5f0e6" font-family="Georgia" font-size="25" font-weight="700">≠ inyectividad global</text><rect x="22" y="175" width="105" height="160" rx="10" fill="#101d2d" stroke="#2f69a2"/><rect x="145" y="175" width="105" height="160" rx="10" fill="#101d2d" stroke="#c9912b"/><text x="35" y="205" fill="#f5f0e6" font-size="15" font-weight="700">LOCAL</text><text x="158" y="205" fill="#f5f0e6" font-size="15" font-weight="700">GLOBAL</text></g><g transform="translate(955 170)"><rect width="280" height="460" rx="16" fill="#08111f"/><text x="22" y="36" fill="#c9912b" font-size="14" font-weight="700">4/10 · EL MAPA</text><text x="22" y="98" fill="#f5f0e6" font-family="Georgia" font-size="28" font-weight="700">Mapa polinómico</text><text x="22" y="142" fill="#d6dbe2" font-size="14">F₁ = (1+xy)³z + …</text><text x="22" y="176" fill="#d6dbe2" font-size="14">F₂ = y + 3x(1+xy)²z + …</text><text x="22" y="210" fill="#d6dbe2" font-size="14">F₃ = 2x − 3x²y − x³z</text><text x="22" y="300" fill="#c9912b" font-family="Georgia" font-size="30" font-weight="700">det JF = −2</text></g><g transform="translate(1250 170)"><rect width="280" height="460" rx="16" fill="#08111f"/><text x="22" y="36" fill="#c9912b" font-size="14" font-weight="700">5/10 · ALCANCE</text><text x="22" y="98" fill="#f5f0e6" font-family="Georgia" font-size="27" font-weight="700">Qué cae</text><text x="22" y="132" fill="#f5f0e6" font-family="Georgia" font-size="27" font-weight="700">y qué no</text><text x="22" y="205" fill="#d6dbe2" font-size="15">• Dimensión 3</text><text x="22" y="245" fill="#d6dbe2" font-size="15">• n ≥ 3 por extensión</text><text x="22" y="285" fill="#d6dbe2" font-size="15">• n = 2 sigue abierto</text><text x="22" y="325" fill="#d6dbe2" font-size="15">• La teoría local permanece</text></g><g transform="translate(70 665)"><rect width="280" height="460" rx="16" fill="#08111f"/><text x="22" y="36" fill="#c9912b" font-size="14" font-weight="700">6/10 · FIBRAS</text><text x="22" y="98" fill="#f5f0e6" font-family="Georgia" font-size="28" font-weight="700">Fibra genérica</text><text x="22" y="132" fill="#f5f0e6" font-family="Georgia" font-size="28" font-weight="700">de grado tres</text><circle cx="65" cy="235" r="35" fill="#101d2d" stroke="#2f69a2"/><circle cx="140" cy="235" r="35" fill="#101d2d" stroke="#c9912b"/><circle cx="215" cy="235" r="35" fill="#101d2d" stroke="#1a6b6b"/></g><g transform="translate(365 665)"><rect width="280" height="460" rx="16" fill="#08111f"/><text x="22" y="36" fill="#c9912b" font-size="14" font-weight="700">7/10 · GEOMETRÍA GLOBAL</text><text x="22" y="98" fill="#f5f0e6" font-family="Georgia" font-size="25" font-weight="700">No-propiedad</text><text x="22" y="130" fill="#f5f0e6" font-family="Georgia" font-size="25" font-weight="700">y superficie asintótica</text><text x="22" y="230" fill="#d6dbe2" font-size="16">Escape → límite → S → Γ</text><text x="22" y="290" fill="#c9912b" font-size="16" font-weight="700">Fallo global, no singular</text></g><g transform="translate(660 665)"><rect width="280" height="460" rx="16" fill="#08111f"/><text x="22" y="36" fill="#c9912b" font-size="14" font-weight="700">8/10 · REDUCCIÓN</text><text x="22" y="98" fill="#f5f0e6" font-family="Georgia" font-size="26" font-weight="700">De dimensión 3</text><text x="22" y="132" fill="#f5f0e6" font-family="Georgia" font-size="26" font-weight="700">a dimensión 79</text><text x="140" y="245" text-anchor="middle" fill="#f5f0e6" font-family="Georgia" font-size="38" font-weight="700">3 → 39 → 79</text><text x="22" y="320" fill="#d6dbe2" font-size="15">18 operaciones explícitas</text></g><g transform="translate(955 665)"><rect width="280" height="460" rx="16" fill="#08111f"/><text x="22" y="36" fill="#c9912b" font-size="14" font-weight="700">9/10 · REPRODUCIBILIDAD</text><text x="22" y="98" fill="#f5f0e6" font-family="Georgia" font-size="26" font-weight="700">Comprobable</text><text x="22" y="132" fill="#f5f0e6" font-family="Georgia" font-size="26" font-weight="700">por máquina</text><text x="22" y="210" fill="#d6dbe2" font-size="15">✓ certificado determinista</text><text x="22" y="250" fill="#d6dbe2" font-size="15">✓ verificador independiente</text><text x="22" y="290" fill="#d6dbe2" font-size="15">✓ esquema y tests</text><text x="22" y="330" fill="#d6dbe2" font-size="15">✓ SHA-256</text></g><g transform="translate(1250 665)"><rect width="280" height="460" rx="16" fill="#08111f"/><text x="22" y="36" fill="#c9912b" font-size="14" font-weight="700">10/10 · REVISIÓN ABIERTA</text><text x="22" y="98" fill="#f5f0e6" font-family="Georgia" font-size="25" font-weight="700">La matemática</text><text x="22" y="130" fill="#f5f0e6" font-family="Georgia" font-size="25" font-weight="700">es exacta.</text><text x="22" y="184" fill="#f5f0e6" font-family="Georgia" font-size="25" font-weight="700">La verificación</text><text x="22" y="216" fill="#f5f0e6" font-family="Georgia" font-size="25" font-weight="700">está abierta.</text><path d="M55 300L140 370L225 300M140 280V370" fill="none" stroke="#c9912b" stroke-width="3"/><circle cx="140" cy="370" r="15" fill="#c9912b"/></g></g><text x="70" y="1215" fill="#506070" font-family="Arial" font-size="18">Versiones PNG listas para publicación incluidas en el paquete descargable.</text><text x="1530" y="1215" text-anchor="end" fill="#c9912b" font-family="Arial" font-size="18" font-weight="700">PREPRINT · NO REVISADO POR PARES</text></svg>