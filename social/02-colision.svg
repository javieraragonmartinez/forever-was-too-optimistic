<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="t d"><title id="t">The exact collision</title><desc id="d">Three rational points and their common image.</desc><rect width="1080" height="1350" fill="#08111f"/><text x="72" y="86" fill="#c9912b" font-family="Arial" font-size="20" font-weight="700">EL CERTIFICADO ELEMENTAL</text><text x="72" y="210" fill="#f5f0e6" font-family="Georgia,serif" font-size="66" font-weight="700">Tres puntos.</text><text x="72" y="286" fill="#f5f0e6" font-family="Georgia,serif" font-size="66" font-weight="700">Una imagen.</text><g font-family="Georgia,serif" font-size="32" fill="#f5f0e6"><text x="98" y="430">p₁ = (0, 0, −1/4)</text><text x="98" y="510">p₂ = (1, −3/2, 13/2)</text><text x="98" y="590">p₃ = (−1, 3/2, 13/2)</text></g><path d="M175 690C330 740 430 825 540 900M540 690V900M905 690C750 740 650 825 540 900" fill="none" stroke-width="5" stroke-linecap="round" stroke="#c9912b"/><circle cx="175" cy="690" r="26" fill="#08111f" stroke="#2f69a2" stroke-width="4"/><circle cx="540" cy="690" r="26" fill="#08111f" stroke="#f5f0e6" stroke-width="4"/><circle cx="905" cy="690" r="26" fill="#08111f" stroke="#c9912b" stroke-width="4"/><circle cx="540" cy="900" r="44" fill="#c9912b"/><text x="540" y="912" text-anchor="middle" fill="#08111f" font-family="Arial" font-size="26" font-weight="700">F(p)</text><text x="72" y="1030" fill="#f5f0e6" font-family="Georgia,serif" font-size="36" font-weight="700">F(p₁) = F(p₂) = F(p₃)</text><text x="72" y="1090" fill="#d6dbe2" font-family="Arial" font-size="30">= (−1/4, 0, 0)</text><line x1="72" y1="1215" x2="1008" y2="1215" stroke="#5b6470"/><text x="72" y="1260" fill="#aab2bd" font-family="Arial" font-size="18">Identidad exacta · reproducible en Python</text><text x="1008" y="1260" text-anchor="end" fill="#c9912b" font-family="Arial" font-size="18" font-weight="700">PREPRINT</text></svg>