<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="t d"><title id="t">Local versus global</title><desc id="d">Local invertibility does not imply global injectivity.</desc><rect width="1080" height="1350" fill="#08111f"/><text x="72" y="86" fill="#c9912b" font-family="Arial" font-size="20" font-weight="700">LA DISTINCIÓN CENTRAL</text><text x="72" y="210" fill="#f5f0e6" font-family="Georgia,serif" font-size="62" font-weight="700">Invertibilidad local</text><text x="72" y="282" fill="#f5f0e6" font-family="Georgia,serif" font-size="62" font-weight="700">no es inyectividad global</text><rect x="72" y="390" width="440" height="500" rx="20" fill="#101d2d" stroke="#2f69a2" stroke-width="3"/><text x="112" y="470" fill="#f5f0e6" font-family="Georgia,serif" font-size="42" font-weight="700">LOCAL</text><text x="112" y="555" fill="#c9912b" font-family="Georgia,serif" font-size="38" font-weight="700">det JF = −2</text><text x="112" y="630" fill="#d6dbe2" font-family="Arial" font-size="27">El diferencial no colapsa</text><text x="112" y="670" fill="#d6dbe2" font-family="Arial" font-size="27">en ningún punto.</text><text x="112" y="785" fill="#aab2bd" font-family="Arial" font-size="23">El teorema de la función</text><text x="112" y="820" fill="#aab2bd" font-family="Arial" font-size="23">inversa sigue siendo local.</text><rect x="568" y="390" width="440" height="500" rx="20" fill="#101d2d" stroke="#c9912b" stroke-width="3"/><text x="608" y="470" fill="#f5f0e6" font-family="Georgia,serif" font-size="42" font-weight="700">GLOBAL</text><text x="608" y="555" fill="#c9912b" font-family="Georgia,serif" font-size="38" font-weight="700">p₁, p₂, p₃</text><text x="608" y="630" fill="#d6dbe2" font-family="Arial" font-size="27">Tres puntos distintos</text><text x="608" y="670" fill="#d6dbe2" font-family="Arial" font-size="27">comparten una imagen.</text><text x="608" y="785" fill="#aab2bd" font-family="Arial" font-size="23">El mapa no es uno-a-uno</text><text x="608" y="820" fill="#aab2bd" font-family="Arial" font-size="23">sobre todo su dominio.</text><text x="72" y="1015" fill="#f5f0e6" font-family="Georgia,serif" font-size="38" font-weight="700">El fallo descrito es global, no singular.</text><text x="72" y="1080" fill="#d6dbe2" font-family="Arial" font-size="25">Esta es la diferencia lógica que el ejemplo hace visible.</text><line x1="72" y1="1215" x2="1008" y2="1215" stroke="#5b6470"/><text x="72" y="1260" fill="#aab2bd" font-family="Arial" font-size="18">Preprint independiente · abierto a revisión</text><text x="1008" y="1260" text-anchor="end" fill="#c9912b" font-family="Arial" font-size="18" font-weight="700">20 JUL 2026</text></svg>