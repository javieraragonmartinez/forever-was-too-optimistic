<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="t d"><title id="t">Reproducibility</title><desc id="d">Five layers of reproducibility published with the preprint.</desc><rect width="1080" height="1350" fill="#08111f"/><text x="72" y="86" fill="#c9912b" font-family="Arial" font-size="20" font-weight="700">REPRODUCIBILIDAD</text><text x="72" y="210" fill="#f5f0e6" font-family="Georgia,serif" font-size="64" font-weight="700">No confíes en la afirmación.</text><text x="72" y="284" fill="#f5f0e6" font-family="Georgia,serif" font-size="64" font-weight="700">Compruébala.</text><g font-family="Arial" font-size="28" fill="#f5f0e6"><circle cx="96" cy="430" r="18" fill="#c9912b"/><text x="96" y="440" text-anchor="middle" fill="#08111f" font-size="22" font-weight="700">✓</text><text x="138" y="440">Generación determinista del certificado</text><circle cx="96" cy="540" r="18" fill="#c9912b"/><text x="96" y="550" text-anchor="middle" fill="#08111f" font-size="22" font-weight="700">✓</text><text x="138" y="550">Regeneración idéntica byte a byte</text><circle cx="96" cy="650" r="18" fill="#c9912b"/><text x="96" y="660" text-anchor="middle" fill="#08111f" font-size="22" font-weight="700">✓</text><text x="138" y="660">Verificador independiente sin SymPy</text><circle cx="96" cy="760" r="18" fill="#c9912b"/><text x="96" y="770" text-anchor="middle" fill="#08111f" font-size="22" font-weight="700">✓</text><text x="138" y="770">JSON Schema 2020-12 y tests</text><circle cx="96" cy="870" r="18" fill="#c9912b"/><text x="96" y="880" text-anchor="middle" fill="#08111f" font-size="22" font-weight="700">✓</text><text x="138" y="880">Manifiesto de integridad SHA-256</text></g><rect x="72" y="990" width="936" height="122" rx="18" fill="#101d2d" stroke="#2f69a2" stroke-width="2"/><text x="108" y="1042" fill="#f5f0e6" font-family="Georgia,serif" font-size="30" font-weight="700">Código, artículo, certificado y pruebas</text><text